<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Guestbook - Mini Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background-image:
        radial-gradient(#ff6ef6 1px, transparent 1px),
        radial-gradient(#7df9ff 1px, transparent 1px),
        radial-gradient(#fffc6e 1px, transparent 1px);
      background-position: 0 0, 25px 25px, 12px 12px;
      background-size: 50px 50px;
    }
    .page { max-width: 500px; margin: 20px auto 60px; padding: 0 12px; }

    /* GNB */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff2df3, #7dff5a, #3fe9ff);
      box-shadow: 0 0 18px rgba(255,255,255,0.3);
    }
    .logo { font-size: 12px; font-weight: 700; white-space: nowrap; }
    .nav { display: flex; gap: 6px; font-size: 12px; font-weight: 600; align-items: center; }
    .nav a {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(0,0,0,0.5);
      text-decoration: none;
      color: #fff;
      white-space: nowrap;
    }
    .nav a.active { background: #000; border-color: #fffc6e; }

    @media (max-width: 600px) {
      .top-bar { padding: 6px 10px; }
      .logo { font-size: 9px; }
      .nav { gap: 4px; font-size: 10px; }
      .nav a { padding: 3px 6px; }
    }

    .chat-panel {
      background: rgba(0,0,0,0.8);
      border: 2px solid #b8ff3c;
      border-radius: 14px;
      box-shadow: 0 0 14px rgba(0,0,0,0.8);
      padding: 14px;
    }
    .chat-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; text-shadow: 0 0 3px #fffc6e; }

    .entry-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .entry-form input {
      padding: 8px 10px;
      border-radius: 20px;
      border: 1px solid #3c3c3c;
      background: #000;
      color: #fff;
      font-size: 13px;
      width: 100%;
    }
    .entry-form input::placeholder { color: #666; }
    .form-row { display: flex; gap: 8px; }
    .form-row input { flex: 1; min-width: 0; }
    .entry-form button {
      padding: 6px 14px;
      border-radius: 30px;
      background: #ff2df3;
      border: 1px solid #ff2df3;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .entry-form button:hover { filter: brightness(1.1); }
    .entry-form button:disabled { opacity: 0.5; cursor: not-allowed; }

    .messages { display: flex; flex-direction: column; gap: 12px; max-height: 60vh; overflow-y: auto; }
    .message { display: flex; align-items: flex-start; gap: 8px; }
    .avatar { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; border: 2px solid #fffc6e; flex-shrink: 0; }
    .bubble {
      background: linear-gradient(90deg, #ffe7a8, #fffad0);
      padding: 8px 12px;
      border-radius: 14px;
      border: 1px solid #ffe68a;
      font-size: 13px;
      color: #333;
      max-width: 100%;
      position: relative;
      word-break: break-word;
    }
    .bubble::after {
      content: "";
      position: absolute;
      left: -6px; top: 12px;
      border-width: 6px;
      border-style: solid;
      border-color: transparent #ffe7a8 transparent transparent;
    }
    .bubble-name { font-weight: 700; font-size: 11px; color: #ff2df3; margin-bottom: 3px; }
    .meta { font-size: 10px; color: #ccc; margin-top: 2px; margin-left: 4px; }
    .loading { text-align: center; font-size: 12px; color: #666; padding: 20px; }
  </style>
</head>
<body>
  <div class="page">
    <header class="top-bar">
      <div class="logo">★ MINI HOME ★</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="diary.html">Diary</a>
        <a href="gallery.html">Gallery</a>
        <a href="guestbook.html" class="active">Guestbook</a>
        <a href="admin.html" title="관리자">⚙️</a>
      </nav>
    </header>

    <section class="chat-panel">
      <div class="chat-title">📒 Guestbook · 방명록</div>
      <div class="entry-form">
        <input type="text" id="guestName" placeholder="이름을 입력하세요" maxlength="20" />
        <div class="form-row">
          <input type="text" id="guestText" placeholder="메시지를 입력하세요" maxlength="200" />
          <button id="submitBtn" onclick="submitComment()">작성</button>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="loading">불러오는 중...</div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _supabase = supabase.createClient(
      'https://wsfplnugfazrqylupjjb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZnBsbnVnZmF6cnF5bHVwampiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTMxMTYsImV4cCI6MjA5MTI4OTExNn0.Aa8nzxI182YgUWU3GoJ4kjiqq-nUeUfY7JxG27BlQYY'
    );

    const AVATAR_SRC = "guest_profile.png";

    async function loadComments() {
      const { data, error } = await _supabase
        .from('guestbook').select('*').order('created_at', { ascending: false });
      const el = document.getElementById('messages');
      if (error) { el.innerHTML = '<div class="loading">불러오기 실패 😢</div>'; return; }
      if (data.length === 0) { el.innerHTML = '<div class="loading">아직 방명록이 없어요. 첫 번째로 남겨주세요!</div>'; return; }
      el.innerHTML = data.map(m => {
        const d = new Date(m.created_at);
        const time = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        return `
          <div class="message">
            <img src="${AVATAR_SRC}" class="avatar" onerror="this.src='profile.jpg'" />
            <div>
              <div class="bubble">
                <div class="bubble-name">${escapeHtml(m.name)}</div>
                ${escapeHtml(m.message)}
              </div>
              <div class="meta">${time}</div>
            </div>
          </div>`;
      }).join('');
    }

    async function submitComment() {
      const name = document.getElementById('guestName').value.trim();
      const message = document.getElementById('guestText').value.trim();
      const btn = document.getElementById('submitBtn');
      if (!name) return alert('이름을 입력해줘요!');
      if (!message) return alert('메시지를 입력해줘요!');
      btn.disabled = true; btn.textContent = '저장 중...';
      const { error } = await _supabase.from('guestbook').insert({ name, message });
      if (error) { alert('저장 실패 😢'); }
      else {
        document.getElementById('guestName').value = '';
        document.getElementById('guestText').value = '';
        loadComments();
      }
      btn.disabled = false; btn.textContent = '작성';
    }

    document.getElementById('guestText').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitComment();
    });

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadComments();
  </script>
</body>
</html>
