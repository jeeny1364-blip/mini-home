<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>똥 피하기 - Mini Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: #000;
      font-family: system-ui, sans-serif;
      color: #fff;
      background-image:
        radial-gradient(#ff6ef6 1px, transparent 1px),
        radial-gradient(#7df9ff 1px, transparent 1px),
        radial-gradient(#fffc6e 1px, transparent 1px);
      background-position: 0 0, 25px 25px, 12px 12px;
      background-size: 50px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff2df3, #7dff5a, #3fe9ff);
      box-shadow: 0 0 18px rgba(255,255,255,0.3);
      width: calc(100% - 24px);
      max-width: 500px;
    }
    .logo { font-size: 12px; font-weight: 700; text-shadow: 0 0 6px #000; }
    .nav { display: flex; gap: 6px; font-size: 12px; font-weight: 600; }
    .nav a {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(0,0,0,0.6);
      text-decoration: none;
      color: #fff;
      white-space: nowrap;
    }

    .game-wrap {
      background: rgba(0,0,0,0.9);
      border: 2px solid #b8ff3c;
      border-radius: 14px;
      overflow: hidden;
      width: calc(100% - 24px);
      max-width: 500px;
    }

    .game-header {
      background: #ff2df3;
      border-bottom: 2px solid #b8ff3c;
      padding: 6px 14px;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      touch-action: none;
    }

    .game-footer {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #aaa;
    }
    .game-footer span { color: #fffc6e; font-weight: 700; }

    #startBtn {
      padding: 6px 16px;
      border-radius: 999px;
      background: #ff2df3;
      border: none;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    #startBtn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="logo">★ MINI HOME ★</div>
    <nav class="nav">
      <a href="index.html">← 홈으로</a>
    </nav>
  </div>

  <div class="game-wrap">
    <div class="game-header">
      <span>👼🏻 똥 피하기</span>
      <span id="scoreDisplay">점수: 0</span>
    </div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="game-footer">
      <span id="bestDisplay">최고: 0</span>
      <button id="startBtn" onclick="startGame()">시작하기</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const w = canvas.parentElement.clientWidth - 4;
      canvas.width = w;
      canvas.height = Math.min(w, 500);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const W = () => canvas.width;
    const H = () => canvas.height;

    let player, poops, score, bestScore = 0, gameRunning, animId, speed, frameCount;

    function initGame() {
      player = { x: W()/2, y: H()-60, size: 36, speed: 7, moving: 0 };
      poops = [];
      score = 0;
      speed = 3;
      frameCount = 0;
      gameRunning = true;
    }

    function spawnPoop() {
      poops.push({
        x: Math.random() * (W() - 30) + 15,
        y: -30,
        size: 28 + Math.random() * 14,
        speed: speed + Math.random() * 2
      });
    }

    function update() {
      if (!gameRunning) return;
      frameCount++;
      score = Math.floor(frameCount / 6);
      document.getElementById('scoreDisplay').textContent = '점수: ' + score;

      // 난이도 빠르게 상승
      speed = 3 + frameCount / 150;

      // 똥 생성 - 갈수록 미친듯이 쏟아짐
      const spawnRate = Math.max(6, 55 - Math.floor(frameCount / 30));
      if (frameCount % spawnRate === 0) spawnPoop();

      // 100프레임 넘으면 가끔 2개 동시에
      if (frameCount > 100 && frameCount % (spawnRate * 3) === 0) spawnPoop();

      // 200프레임 넘으면 가끔 3개 동시에
      if (frameCount > 200 && frameCount % (spawnRate * 5) === 0) spawnPoop();

      player.x += player.moving * player.speed;
      player.x = Math.max(player.size/2, Math.min(W() - player.size/2, player.x));

      for (let i = poops.length - 1; i >= 0; i--) {
        poops[i].y += poops[i].speed;
        if (poops[i].y > H() + 30) { poops.splice(i, 1); continue; }
        const dx = poops[i].x - player.x;
        const dy = poops[i].y - player.y;
        if (Math.sqrt(dx*dx + dy*dy) < (player.size/2 + poops[i].size/2) * 0.65) {
          gameOver(); return;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W(), H());

      // 밝은 배경
      ctx.fillStyle = '#1a0a2e';
      ctx.fillRect(0, 0, W(), H());

      // 별 (밝게)
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (let i = 0; i < 40; i++) {
        const sx = ((i * 137 + frameCount * 0.2) % W());
        const sy = ((i * 97) % H());
        ctx.fillRect(sx, sy, 2, 2);
      }

      // 바닥 라인
      ctx.strokeStyle = 'rgba(184,255,60,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, H() - 30);
      ctx.lineTo(W(), H() - 30);
      ctx.stroke();

      if (gameRunning) {
        // 플레이어
        ctx.font = player.size + 'px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('👼🏻', player.x, player.y);

        // 똥
        for (const p of poops) {
          ctx.font = p.size + 'px serif';
          ctx.fillText('💩', p.x, p.y);
        }

        // 점수 표시 (게임 중)
        ctx.fillStyle = 'rgba(255,252,110,0.6)';
        ctx.font = 'bold 12px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText('SCORE: ' + score, 10, 20);
      }

      // 게임 오버
      if (!gameRunning && frameCount > 0) {
        // 똥도 보이게
        for (const p of poops) {
          ctx.font = p.size + 'px serif';
          ctx.textAlign = 'center';
          ctx.fillText('💩', p.x, p.y);
        }
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, W(), H());
        ctx.textAlign = 'center';
        ctx.font = 'bold 24px system-ui';
        ctx.fillStyle = '#fff';
        ctx.fillText('💩 Game Over 💩', W()/2, H()/2 - 40);
        ctx.font = 'bold 18px system-ui';
        ctx.fillStyle = '#fffc6e';
        ctx.fillText('점수: ' + score, W()/2, H()/2);
        ctx.fillStyle = '#7df9ff';
        ctx.fillText('최고: ' + bestScore, W()/2, H()/2 + 30);
        ctx.fillStyle = '#ff2df3';
        ctx.font = '13px system-ui';
        ctx.fillText('시작하기 버튼을 눌러 다시 플레이!', W()/2, H()/2 + 65);
      }

      // 시작 전
      if (!gameRunning && frameCount === 0) {
        ctx.textAlign = 'center';
        ctx.font = '50px serif';
        ctx.fillText('👼🏻', W()/2, H()/2 - 30);
        ctx.font = 'bold 18px system-ui';
        ctx.fillStyle = '#fffc6e';
        ctx.fillText('똥을 피하세요!', W()/2, H()/2 + 20);
        ctx.font = '13px system-ui';
        ctx.fillStyle = '#ccc';
        ctx.fillText('← → 키 또는 화면 터치로 이동', W()/2, H()/2 + 50);
      }
    }

    function gameLoop() {
      update();
      draw();
      animId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
      if (animId) cancelAnimationFrame(animId);
      initGame();
      gameLoop();
    }

    function gameOver() {
      gameRunning = false;
      if (score > bestScore) {
        bestScore = score;
        document.getElementById('bestDisplay').textContent = '최고: ' + bestScore;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') player && (player.moving = -1);
      if (e.key === 'ArrowRight') player && (player.moving = 1);
    });
    document.addEventListener('keyup', e => {
      if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && player) player.moving = 0;
    });

    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const dx = e.touches[0].clientX - touchStartX;
      if (player) {
        player.x += dx * 0.5;
        player.x = Math.max(player.size/2, Math.min(W() - player.size/2, player.x));
      }
      touchStartX = e.touches[0].clientX;
    });

    frameCount = 0;
    gameRunning = false;
    draw();
  </script>
</body>
</html>
