<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Mini Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background-image:
        radial-gradient(#ff6ef6 1px, transparent 1px),
        radial-gradient(#7df9ff 1px, transparent 1px),
        radial-gradient(#fffc6e 1px, transparent 1px);
      background-position: 0 0, 25px 25px, 12px 12px;
      background-size: 50px 50px;
    }
    .page { max-width: 600px; margin: 24px auto 60px; padding: 0 12px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff2df3, #7dff5a, #3fe9ff);
      box-shadow: 0 0 18px rgba(255,255,255,0.3);
    }
    .logo { font-size: 12px; font-weight: 700; }
    .nav { display: flex; gap: 12px; font-size: 12px; font-weight: 600; }
    .nav a {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(0,0,0,0.5);
      text-decoration: none;
      color: #fff;
    }

    .panel {
      background: rgba(0,0,0,0.9);
      border-radius: 12px;
      border: 2px solid #b8ff3c;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .panel-header {
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      background: #ff2df3;
      border-bottom: 2px solid #b8ff3c;
    }
    .panel-body { padding: 14px; }

    /* 로그인 */
    #loginBox { text-align: center; padding: 30px 0; }
    #loginBox input {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid #3c3c3c;
      background: #000;
      color: #fff;
      font-size: 14px;
      margin-bottom: 10px;
      display: block;
      width: 100%;
    }
    #loginBox button {
      padding: 8px 24px;
      border-radius: 999px;
      background: #ff2df3;
      border: none;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
    }

    /* 글쓰기 폼 */
    #adminBox { display: none; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; color: #fffc6e; margin-bottom: 4px; display: block; }
    .form-group textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #3c3c3c;
      background: #000;
      color: #fff;
      font-size: 13px;
      resize: vertical;
    }
    .form-group input[type="file"] {
      width: 100%;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid #3c3c3c;
      background: #000;
      color: #fff;
      font-size: 12px;
    }
    .preview-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #b8ff3c;
      margin-top: 8px;
      display: none;
    }
    .btn-submit {
      width: 100%;
      padding: 10px;
      border-radius: 999px;
      background: #ff2df3;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 12px; color: #aaa; margin-top: 8px; text-align: center; }

    /* 포스트 목록 */
    .post-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .post-item:last-child { border-bottom: none; }
    .post-thumb {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #b8ff3c;
      flex-shrink: 0;
    }
    .post-info { flex: 1; }
    .post-content { font-size: 13px; margin-bottom: 4px; }
    .post-date { font-size: 11px; color: #fffc6e; }
    .btn-delete {
      padding: 4px 10px;
      border-radius: 999px;
      background: #ff4444;
      border: none;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .loading { text-align: center; font-size: 12px; color: #666; padding: 20px; }
  </style>
</head>
<body>
  <div class="page">
    <header class="top-bar">
      <div class="logo">★ ADMIN ★</div>
      <nav class="nav">
        <a href="index.html">← 홈으로</a>
      </nav>
    </header>

    <!-- 로그인 -->
    <div class="panel" id="loginPanel">
      <div class="panel-header">🔒 관리자 로그인</div>
      <div class="panel-body">
        <div id="loginBox">
          <input type="password" id="pwInput" placeholder="비밀번호 입력" />
          <button onclick="checkLogin()">로그인</button>
        </div>
      </div>
    </div>

    <!-- 관리자 영역 -->
    <div id="adminBox">
      <!-- 새 포스트 작성 -->
      <div class="panel">
        <div class="panel-header">✏️ 새 포스트 작성</div>
        <div class="panel-body">
          <div class="form-group">
            <label>사진 선택</label>
            <input type="file" id="postImage" accept="image/*" onchange="previewImage()" />
            <img id="previewImg" class="preview-img" />
          </div>
          <div class="form-group">
            <label>내용</label>
            <textarea id="postContent" placeholder="포스트 내용을 입력하세요 ✍️"></textarea>
          </div>
          <button class="btn-submit" id="submitBtn" onclick="submitPost()">포스트 올리기 🚀</button>
          <div class="status" id="submitStatus"></div>
        </div>
      </div>

      <!-- 포스트 목록 -->
      <div class="panel">
        <div class="panel-header">📋 포스트 목록</div>
        <div class="panel-body" id="postList">
          <div class="loading">불러오는 중...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _supabase = supabase.createClient(
      'https://wsfplnugfazrqylupjjb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZnBsbnVnZmF6cnF5bHVwampiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTMxMTYsImV4cCI6MjA5MTI4OTExNn0.Aa8nzxI182YgUWU3GoJ4kjiqq-nUeUfY7JxG27BlQYY'
    );

    // ⚠️ 비밀번호
    const ADMIN_PASSWORD = '013000';

    function checkLogin() {
      const pw = document.getElementById('pwInput').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('adminBox').style.display = 'block';
        loadPosts();
      } else {
        alert('비밀번호가 틀렸어요!');
      }
    }

    document.getElementById('pwInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkLogin();
    });

    // 이미지 미리보기
    function previewImage() {
      const file = document.getElementById('postImage').files[0];
      if (!file) return;
      const preview = document.getElementById('previewImg');
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
    }

    // 포스트 올리기
    async function submitPost() {
      const content = document.getElementById('postContent').value.trim();
      const file = document.getElementById('postImage').files[0];
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('submitStatus');

      if (!content) return alert('내용을 입력해줘요!');

      btn.disabled = true;
      status.textContent = '업로드 중...';

      let image_url = null;

      // 이미지 있으면 Storage에 업로드
      if (file) {
        const fileName = Date.now() + '_' + file.name;
        const { error: uploadError } = await _supabase.storage
          .from('posts')
          .upload(fileName, file);

        if (uploadError) {
          alert('이미지 업로드 실패 😢');
          btn.disabled = false;
          status.textContent = '';
          return;
        }

        const { data: urlData } = _supabase.storage.from('posts').getPublicUrl(fileName);
        image_url = urlData.publicUrl;
      }

      // DB에 저장
      const { error } = await _supabase.from('posts').insert({ content, image_url });

      if (error) {
        alert('저장 실패 😢');
      } else {
        status.textContent = '✅ 포스트 올렸어요!';
        document.getElementById('postContent').value = '';
        document.getElementById('postImage').value = '';
        document.getElementById('previewImg').style.display = 'none';
        loadPosts();
      }

      btn.disabled = false;
    }

    // 포스트 목록 불러오기
    async function loadPosts() {
      const { data, error } = await _supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

      const el = document.getElementById('postList');
      if (error || !data || data.length === 0) {
        el.innerHTML = '<div class="loading">아직 포스트가 없어요 📝</div>';
        return;
      }

      el.innerHTML = data.map(p => {
        const date = new Date(p.created_at);
        const dateText = date.getFullYear() + '-' +
          String(date.getMonth()+1).padStart(2,'0') + '-' +
          String(date.getDate()).padStart(2,'0');
        return `
          <div class="post-item">
            ${p.image_url ? `<img src="${p.image_url}" class="post-thumb">` : '<div style="width:60px;height:60px;background:#222;border-radius:6px;flex-shrink:0"></div>'}
            <div class="post-info">
              <div class="post-content">${escapeHtml(p.content)}</div>
              <div class="post-date">${dateText}</div>
            </div>
            <button class="btn-delete" onclick="deletePost(${p.id}, '${p.image_url}')">삭제</button>
          </div>
        `;
      }).join('');
    }

    // 포스트 삭제
    async function deletePost(id, imageUrl) {
      if (!confirm('이 포스트를 삭제할까요?')) return;

      // Storage 이미지 삭제
      if (imageUrl) {
        const fileName = imageUrl.split('/').pop();
        await _supabase.storage.from('posts').remove([fileName]);
      }

      const { error } = await _supabase.from('posts').delete().eq('id', id);
      if (error) { alert('삭제 실패 😢'); return; }
      loadPosts();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
